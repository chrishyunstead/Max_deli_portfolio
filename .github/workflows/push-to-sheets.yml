# .github/workflows/push-to-sheets.yml
name: run-app-push-to-sheets

on:
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = KST 10:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA key
        run: |
          echo "${{ secrets.JSON_KEY_PATH }}" | base64 -d > sa.json
          chmod 600 sa.json

      - name: Run app.py
        env:
          HOLISTICS_API_KEY: ${{ secrets.HOLISTICS_API_KEY }}
          HOLISTICS_WIDGET_IDS: ${{ secrets.HOLISTICS_WIDGET_IDS }}    # "656368,111111,222222,333333"
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET: max                                              # ✅ 시크릿 안 쓰고 리터럴
        run: python app.py