name: run-app-push-to-sheets

on:
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = KST 10:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA key
        run: |
          echo "${{ secrets.JSON_KEY_PATH }}" > sa.json
          chmod 600 sa.json

      # ✅ SSH 개인키를 파일로 저장(SSHTunnelForwarder에 경로로 전달)
      - name: Write SSH key (for SSHTunnelForwarder)
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem
          # 호스트 키 고정(권장)
          ssh-keyscan -H "${{ secrets.SSH_HOST_VER_1 }}" >> ~/.ssh/known_hosts

      # ⛔️ 불필요: 당신의 파이썬 코드가 터널을 여므로 이 스텝은 제거
      # - name: Setup SSH tunnel
      #   ...

      - name: Run app.py
        env:
          # DB/SSH
          SSH_HOST_VER_1: ${{ secrets.SSH_HOST_VER_1 }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY_PATH: /tmp/ssh_key.pem   # 👈 경로를 넘깁니다
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        run: |
          python app.py