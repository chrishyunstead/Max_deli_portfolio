name: run-app-push-to-sheets

on:
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = KST 10:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA key
        run: |
          printf "%s" "${{ secrets.JSON_KEY_PATH }}" > sa.json
          chmod 600 sa.json

      - name: Write SSH key (for SSHTunnelForwarder)
        run: |
          # 1) SSH 개인키 파일 생성 (heredoc 대신 printf로 개행/특수문자 보존)
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

          # 2) known_hosts 디렉터리 준비
          mkdir -p ~/.ssh

          # 3) 호스트 키 등록 (사설망이면 실패해도 통과)
          ssh-keyscan -T 5 -H "${{ secrets.SSH_HOST_VER_1 }}" >> ~/.ssh/known_hosts || echo "keyscan skipped"

      - name: Run app.py
        env:
          SSH_PRIVATE_KEY_PATH: /tmp/ssh_key.pem
          SSH_HOST_VER_1: ${{ secrets.SSH_HOST_VER_1 }}
          SSH_USER: ${{ secrets.SSH_USER }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        run: python app.py