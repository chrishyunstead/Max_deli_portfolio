# .github/workflows/push-to-sheets.yml
name: run-app-push-to-sheets

on:
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = KST 10:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA key
        run: |
          printf "%s" "${{ secrets.JSON_KEY_PATH }}" > sa.json
          chmod 600 sa.json

      - name: Run app.py
        env:
          PYTHONUNBUFFERED: "1"
          HOLISTICS_API_KEY: ${{ secrets.HOLISTICS_API_KEY }}
          HOLISTICS_REPORT_IDS: ${{ secrets.HOLISTICS_REPORT_IDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET: ${{ secrets.WORKSHEET }}
          TAB_MODEL: ${{ secrets.TAB_MODEL }}
          TAB_TIME: ${{ secrets.TAB_TIME }}
          TAB_PREDICT: ${{ secrets.TAB_PREDICT }}
          TAB_SCHEDULE: ${{ secrets.TAB_SCHEDULE }}
        run: python app.py