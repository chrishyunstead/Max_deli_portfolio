# .github/workflows/push-to-sheets.yml
name: run-app-push-to-sheets

on:
  # schedule:
  #   - cron: "0 2 * * *"   # UTC 02:00 = KST 11:00
  workflow_dispatch:

concurrency:
  group: push-to-sheets         # 동시 중복 실행 방지
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA key
        run: |
          echo "${{ secrets.JSON_KEY_PATH }}" | base64 -d > sa.json
          chmod 600 sa.json

      - name: Run app.py (retry up to 5x with backoff)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 5              # 재시도 횟수
          retry_wait_seconds: 30        # 1차 대기
          retry_on: error               # non-zero exit일 때 재시도
          command: |
            python app.py

        env:
          HOLISTICS_API_KEY: ${{ secrets.HOLISTICS_API_KEY }}
          HOLISTICS_WIDGET_IDS: ${{ secrets.HOLISTICS_WIDGET_IDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET: max_data

      - name: Upload merged_df artifact (even on failure)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: merged_df-${{ github.run_id }}
          path: artifacts/**/merged_df.csv
          if-no-files-found: warn
          retention-days: 30